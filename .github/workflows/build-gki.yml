name: Build GKI 6.12 with susfs
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04 # 锁定 Kleaf 兼容性最强、最稳健的 22.04 版本
    steps:
    - name: Free up disk space safely
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false # 不清理 Android SDK，保留部分基础构建工具
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true # 开启虚拟内存，防止 Kleaf 编译时内存溢出

    - name: Configure Git and Environment
      run: |
        git config --global user.name "Github Action"
        git config --global user.email "action@github.com"
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/repo

    - name: Sync Google ACK 6.12 Source
      run: |
        mkdir kernel_workspace && cd kernel_workspace
        # 精准拉取匹配你的 6.12 / Android 16 通用内核源码
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12 --depth=1
        repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle

    - name: Inject SukiSU & susfs
      run: |
        cd kernel_workspace/common
        # 注入 ksun (SukiSU) 和 susfs
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main

    - name: Build susfs LKM Module
      run: |
        cd kernel_workspace
        # 编译目标改为 ksu_susfs 模块
        tools/bazel build //common:ksu_susfs
        # 寻找生成的 .ko 文件位置并拷贝出来
        mkdir -p out/module/
        find bazel-bin/common -name "ksu_susfs.ko" -exec cp {} out/module/ \;

    - name: Upload susfs Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ksu_susfs_module
        path: kernel_workspace/out/module/ksu_susfs.ko
